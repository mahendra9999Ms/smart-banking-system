{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASB Smart Banking</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --navy:   #0B1629;
      --navy2:  #111E35;
      --navy3:  #172540;
      --gold:   #C9A84C;
      --gold2:  #E8C46A;
      --teal:   #19B8A0;
      --red:    #E05252;
      --text:   #E8EDF5;
      --muted:  #7A8BAA;
      --border: rgba(201,168,76,0.18);
      --card:   rgba(17,30,53,0.95);
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Subtle grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    body > * { position: relative; z-index: 1; }

    /* ── Navbar ── */
    .asb-nav {
      background: rgba(11,22,41,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      padding: 0 2rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
    }
    .asb-nav .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 10px;
    }
    .asb-nav .brand span { color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-links a.active { color: var(--gold); }
    .nav-links a.danger { color: var(--red) !important; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user {
      display: flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.875rem;
      color: var(--gold);
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    .nav-user:hover { background: rgba(201,168,76,0.16); }
    .nav-mobile-toggle { display:none; background:none; border:none; cursor:pointer; padding:4px 8px; }
    .nav-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--navy2); border: 1px solid var(--border);
      border-radius: var(--radius); min-width: 190px;
      box-shadow: var(--shadow); overflow: hidden;
      z-index: 9999;
    }
    /* Dropdown controlled via JS toggleNavDrop() */
    .nav-dropdown a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; color: var(--text);
      text-decoration: none; font-size: 0.875rem;
      transition: background 0.15s;
    }
    .nav-dropdown a:hover { background: rgba(255,255,255,0.05); }
    .nav-dropdown a.red { color: var(--red); }
    .nav-sep { height: 1px; background: var(--border); }

    /* ── Page Wrapper ── */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; color: var(--text);
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 12px;
    }
    .page-title .icon-pill {
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 12px;
      font-size: 1.1rem;
    }

    /* ── Cards ── */
    .asb-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .asb-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.45); }
    .asb-card .card-label {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 8px;
    }
    .asb-card .card-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; color: var(--text);
    }
    .asb-card .card-value.gold { color: var(--gold); }
    .asb-card .card-value.teal { color: var(--teal); }
    .asb-card .card-value.red  { color: var(--red);  }

    /* Stat icon */
    .stat-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 14px;
    }
    .stat-icon.gold { background: rgba(201,168,76,0.15); color: var(--gold); }
    .stat-icon.teal { background: rgba(25,184,160,0.15); color: var(--teal); }
    .stat-icon.red  { background: rgba(224,82,82,0.15);  color: var(--red);  }
    .stat-icon.blue { background: rgba(99,179,237,0.15); color: #63B3ED; }

    /* ── Forms ── */
    .asb-label {
      font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 6px; display: block;
    }
    .asb-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text);
      padding: 11px 16px;
      font-size: 0.925rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .asb-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .asb-input option { background: var(--navy2); }

    /* ── Buttons ── */
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--navy); font-weight: 700; border: none;
      padding: 11px 28px; border-radius: 10px;
      font-size: 0.9rem; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-gold:hover { opacity: 0.88; transform: translateY(-1px); color: var(--navy); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      padding: 10px 22px; border-radius: 10px;
      font-size: 0.875rem; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-teal {
      background: var(--teal); color: #fff; border: none;
      padding: 10px 22px; border-radius: 10px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-teal:hover { opacity: 0.85; }
    .btn-red {
      background: var(--red); color: #fff; border: none;
      padding: 7px 16px; border-radius: 8px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-red:hover { opacity: 0.85; }
    .btn-sm-gold {
      background: rgba(201,168,76,0.15); color: var(--gold);
      border: 1px solid var(--border); padding: 6px 14px;
      border-radius: 8px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-sm-gold:hover { background: var(--gold); color: var(--navy); }

    /* ── Tables ── */
    .asb-table { width: 100%; border-collapse: collapse; }
    .asb-table th {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .asb-table td {
      padding: 13px 16px; font-size: 0.875rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
    }
    .asb-table tr:hover td { background: rgba(255,255,255,0.025); }
    .asb-table tr.fraud-row td { background: rgba(224,82,82,0.06); }

    /* ── Badges ── */
    .badge-success { background: rgba(25,184,160,0.15); color: var(--teal); border: 1px solid rgba(25,184,160,0.3); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-danger  { background: rgba(224,82,82,0.15);  color: var(--red);  border: 1px solid rgba(224,82,82,0.3);  padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-gold    { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid var(--border);        padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-blue    { background: rgba(99,179,237,0.15); color: #63B3ED;    border: 1px solid rgba(99,179,237,0.3); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

    /* ── Alerts ── */
    .asb-alert {
      border-radius: 10px; padding: 13px 18px;
      font-size: 0.875rem; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .asb-alert.success { background: rgba(25,184,160,0.12); border: 1px solid rgba(25,184,160,0.3); color: var(--teal); }
    .asb-alert.error   { background: rgba(224,82,82,0.12);  border: 1px solid rgba(224,82,82,0.3);  color: var(--red);  }
    .asb-alert.info    { background: rgba(201,168,76,0.1);  border: 1px solid var(--border);         color: var(--gold); }

    /* ── Pagination ── */
    .asb-page { display: flex; gap: 6px; justify-content: center; margin-top: 24px; }
    .asb-page a, .asb-page span {
      padding: 7px 14px; border-radius: 8px; font-size: 0.85rem;
      border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; transition: all 0.2s;
    }
    .asb-page a:hover { border-color: var(--gold); color: var(--gold); }
    .asb-page span.current { background: rgba(201,168,76,0.15); color: var(--gold); border-color: var(--gold); }

    /* ── Account number chip ── */
    .acct-chip {
      font-family: 'Courier New', monospace;
      background: rgba(201,168,76,0.08); border: 1px solid var(--border);
      color: var(--gold); padding: 4px 12px; border-radius: 6px;
      font-size: 0.9rem; letter-spacing: 0.05em;
    }

    /* ── Risk Score bar ── */
    .risk-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 4px; }
    .risk-fill { height: 100%; border-radius: 2px; }

    /* ── Section divider ── */
    .asb-divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
      margin-bottom: 20px;
    }
    .filter-bar .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-bar .filter-group label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

    /* ── Balance card ── */
    .balance-card {
      background: linear-gradient(135deg, #172540, #0F1E38);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 32px; position: relative; overflow: hidden;
    }
    .balance-card::after {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
      border-radius: 50%;
    }
    .balance-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .balance-amount { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--gold); margin: 4px 0; }

    /* Animations */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.1s; }
    .fade-up-3 { animation-delay: 0.15s; }
    .fade-up-4 { animation-delay: 0.2s; }

    /* Responsive */
    @media(max-width:768px) {
      .nav-links { display: none; }
      .page-wrap { padding: 20px 16px; }
      .balance-amount { font-size: 2rem; }
    }
  </style>
</head>
<body>

{% if user.is_authenticated %}
  {% if user.is_staff %}
    {% include "admin/navbar.html" %}
  {% else %}
    {% include "user/navbar.html" %}
  {% endif %}
{% endif %}

<div class="{% if user.is_authenticated %}page-wrap{% endif %}">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
