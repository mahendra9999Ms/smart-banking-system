{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">
<div class="page-title fade-up"><span class="icon-pill"><i class="bi bi-arrow-down-left-circle"></i></span>Receive Money</div>
<div class="asb-card fade-up fade-up-1 text-center">
  <div style="font-size:2.5rem;color:var(--teal);margin-bottom:12px;"><i class="bi bi-qr-code"></i></div>
  <div style="font-weight:600;margin-bottom:8px;">Your Account Number</div>
  <div class="acct-chip" style="font-size:1.2rem;padding:10px 24px;display:inline-block;margin-bottom:16px;">
    {{ request.user.userprofile.account_number }}
  </div>
  <div style="font-size:0.82rem;color:var(--muted);">Share this account number with the sender to receive funds.</div>
</div>
</div>
</div>
{% endblock %}
